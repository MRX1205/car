<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="utf-8">
    <title>购物车</title>
    <meta name="keywords" content=""/>
    <meta name="description" content=""/>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="../../layui/css/layui.css">
    <link rel="stylesheet" href="../../xznstatic/css/common.css"/>
    <link rel="stylesheet" href="../../xznstatic/css/style.css"/>
    <link rel="stylesheet" href="../../xznstatic/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../css/theme.css"/>
</head>
<style>
    html::after {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        bottom: 0;
        content: '';
        display: block;
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
    }

    .cart-list {
        padding: 20px 0;
        display: flex;
        justify-content: center;
    }

    .cart-list .box {
        width: 1002px;
        margin: 0 auto;
    }

    .cart-card {
        display: flex;
        background: #fff;
        padding: 15px;
        margin-bottom: 15px;
        border: 1px solid #f2f2f2;
        border-radius: 6px;
        align-items: center;
    }

    .cart-card img {
        width: 160px;
        height: 120px;
        object-fit: cover;
        border-radius: 4px;
    }

    .cart-card .info {
        flex: 1;
        padding-left: 15px;
    }

    .cart-card .info .row {
        margin-bottom: 6px;
        font-size: 14px;
    }

    .cart-actions {
        background: #fff;
        padding: 10px;
        border: 1px solid #f2f2f2;
        border-radius: 6px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
</style>
<body>
<div id="app">
    <div class="cart-list">
        <div class="box">
            <div class="index-title sub_backgroundColor" :style='{"padding":"10px","boxShadow":"0 0 2px rgba(160, 67, 26, 1)","margin":"10px auto","borderColor":"rgba(0,0,0,.3)","color":"rgba(255, 255, 255, 1)","borderRadius":"4px","borderWidth":"0","fontSize":"20px","borderStyle":"solid","height":"auto"}'>
                <span>购物车</span>
            </div>

            <div class="cart-actions" v-if="dataList.length > 0">
                <div>
                    <input type="checkbox" v-model="selectAll" @change="toggleAll"> 全选
                </div>
                <div>
                    已选 {{selectedIds.length}} 辆，合计：{{totalPrice}} RMB
                </div>
                <div>
                    <button class="layui-btn layui-btn-danger layui-btn-sm" @click="removeSelected">删除选中</button>
                    <button class="layui-btn layui-btn-normal layui-btn-sm" @click="checkout">去结算</button>
                </div>
            </div>

            <div v-if="dataList.length === 0" style="text-align:center;padding:20px;background:#fff;border-radius:6px;">
                购物车暂无车辆
            </div>

            <div v-for="(item,index) in dataList" :key="index" class="cart-card">
                <div>
                    <input type="checkbox" v-model="selectedIds" :value="item.id">
                </div>
                <div style="margin-left:10px;">
                    <img :src="item.cheliangPhoto" alt="">
                </div>
                <div class="info">
                    <div class="row">车辆：{{item.cheliangName}}</div>
                    <div class="row">价格：{{item.cheliangNewMoney}}</div>
                    <div class="row" v-if="item.shangjiaName">商家：{{item.shangjiaName}}</div>
                    <div class="row" v-if="item.insertTime">加入时间：{{item.insertTime}}</div>
                </div>
            </div>

            <div id="pager"></div>
        </div>
    </div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>

<script>
    var vue = new Vue({
        el: '#app',
        data: {
            dataList: [],
            total: 0,
            page: 1,
            limit: 10,
            selectedIds: [],
            selectAll: false,
            totalPrice: 0
        },
        methods: {
            loadData() {
                let params = {
                    page: this.page,
                    limit: this.limit,
                    orderBy: 'id',
                    yonghuId: localStorage.getItem('userid')
                };
                layui.http.request('cheliangCart/list', 'get', params, (res) => {
                    this.dataList = res.data.list || [];
                    this.total = res.data.total || 0;
                    this.renderPager();
                    this.syncSelectAll();
                });
            },
            renderPager() {
                layui.laypage.render({
                    elem: 'pager',
                    count: this.total,
                    limit: this.limit,
                    curr: this.page,
                    layout: ['count', 'prev', 'page', 'next'],
                    jump: (obj, first) => {
                        if (!first) {
                            this.page = obj.curr;
                            this.loadData();
                        }
                    }
                });
            },
            toggleAll() {
                if (this.selectAll) {
                    this.selectedIds = this.dataList.map(item => item.id);
                } else {
                    this.selectedIds = [];
                }
                this.updateTotalPrice();
            },
            syncSelectAll() {
                this.selectAll = this.dataList.length > 0 && this.selectedIds.length === this.dataList.length;
                this.updateTotalPrice();
            },
            updateTotalPrice() {
                let total = 0;
                this.dataList.forEach(item => {
                    if (this.selectedIds.indexOf(item.id) !== -1) {
                        let price = Number(item.cheliangNewMoney || 0);
                        if (!isNaN(price)) {
                            total += price;
                        }
                    }
                });
                this.totalPrice = total.toFixed(2);
            },
            removeSelected() {
                if (this.selectedIds.length === 0) {
                    layui.layer.msg('请选择要删除的车辆', {time: 2000, icon: 5});
                    return;
                }
                layui.layer.confirm('确认删除选中车辆吗？', {icon: 3, title: '提示'}, () => {
                    layui.http.requestJson('cheliangCart/delete', 'post', this.selectedIds, () => {
                        layui.layer.msg('删除成功', {time: 1500, icon: 6}, () => {
                            this.selectedIds = [];
                            this.loadData();
                        });
                    });
                });
            },
            checkout() {
                if (this.selectedIds.length === 0) {
                    layui.layer.msg('请选择要结算的车辆', {time: 2000, icon: 5});
                    return;
                }
                layui.layer.confirm('确认结算选中车辆吗？', {icon: 3, title: '提示'}, () => {
                    layui.http.requestJson('cheliangCart/checkout', 'post', this.selectedIds, (res) => {
                        layui.layer.msg('下单成功', {time: 1500, icon: 6}, () => {
                            this.selectedIds = [];
                            this.loadData();
                            if (res.orderIds && res.orderIds.length > 0) {
                                window.location.href = '../cheliangOrder/pay.html?orderIds=' + res.orderIds.join(',');
                            } else {
                                window.location.href = '../cheliangOrder/list.html';
                            }
                        });
                    });
                });
            }
        },
        watch: {
            selectedIds() {
                this.syncSelectAll();
            }
        }
    });

    layui.use(['layer', 'http', 'laypage'], function () {
        if (!localStorage.getItem('userTable')) {
            window.location.href = '../login/login.html';
            return;
        }
        if (localStorage.getItem('userTable') != 'yonghu') {
            layui.layer.msg('只有用户账号可以访问购物车', {time: 2000, icon: 5});
            return;
        }
        vue.loadData();
    });
</script>
</body>
</html>
