<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>支付成功</title>
    <link rel="stylesheet" href="../../layui/css/layui.css">
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../../css/theme.css" />
    <link rel="stylesheet" href="../../css/common.css" />
    <style>
        body {
            background: #f5f5f5;
        }
        .success-card {
            width: 800px;
            margin: 40px auto;
            background: #fff;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.06);
        }
        .success-title {
            font-size: 22px;
            margin-bottom: 10px;
            color: #2f8f3f;
        }
        .success-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .success-price {
            font-size: 20px;
            color: #d4492a;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="success-card">
        <div class="success-title">支付成功</div>
        <div class="success-info">感谢您的购买，订单已完成支付</div>
        <div class="success-price">支付金额：{{totalPrice}} RMB</div>
        <div class="success-info">支付方式：{{payType}}</div>
        <div>
            <button class="layui-btn btn-theme" @click="jumpOrder">查看我的订单</button>
            <button class="layui-btn layui-btn-primary" @click="goHome">返回首页</button>
        </div>
    </div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script>
    var vue = new Vue({
        el: '#app',
        data: {
            totalPrice: '0.00',
            payType: '微信支付'
        },
        methods: {
            jumpOrder() {
                window.location.href = './list.html';
            },
            goHome() {
                window.location.href = '../../index.html';
            }
        }
    });

    layui.use(['http'], function () {
        let totalPrice = layui.http.getParam('totalPrice');
        let payType = layui.http.getParam('payType');
        if (totalPrice) {
            vue.totalPrice = totalPrice;
        }
        if (payType) {
            vue.payType = payType;
        }
    });
</script>
</body>
</html>
