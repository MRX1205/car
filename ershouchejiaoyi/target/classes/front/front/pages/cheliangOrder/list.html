<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="utf-8">
    <title>交易订单</title>
    <meta name="keywords" content=""/>
    <meta name="description" content=""/>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="../../layui/css/layui.css">
    <link rel="stylesheet" href="../../xznstatic/css/common.css"/>
    <link rel="stylesheet" href="../../xznstatic/css/style.css"/>
    <link rel="stylesheet" href="../../xznstatic/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../css/theme.css"/>
</head>
<style>
    html::after {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        bottom: 0;
        content: '';
        display: block;
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
    }

    .order-list {
        padding: 20px 0;
        display: flex;
        justify-content: center;
    }

    .order-list .box {
        width: 1002px;
        margin: 0 auto;
    }

    .order-card {
        display: flex;
        background: #fff;
        padding: 15px;
        margin-bottom: 15px;
        border: 1px solid #f2f2f2;
        border-radius: 6px;
    }

    .order-card img {
        width: 160px;
        height: 120px;
        object-fit: cover;
        border-radius: 4px;
    }

    .order-card .info {
        flex: 1;
        padding-left: 15px;
    }

    .order-card .info .row {
        margin-bottom: 6px;
        font-size: 14px;
    }

    .order-card .actions button {
        margin-right: 8px;
    }
</style>
<body>
<div id="app">
    <div class="order-list">
        <div class="box">
            <div class="index-title sub_backgroundColor" :style='{"padding":"10px","boxShadow":"0 0 2px rgba(160, 67, 26, 1)","margin":"10px auto","borderColor":"rgba(0,0,0,.3)","color":"rgba(255, 255, 255, 1)","borderRadius":"4px","borderWidth":"0","fontSize":"20px","borderStyle":"solid","height":"auto"}'>
                <span>交易订单</span>
            </div>

            <div v-if="dataList.length === 0" style="text-align:center;padding:20px;background:#fff;border-radius:6px;">
                暂无订单
            </div>

            <div v-for="(item,index) in dataList" :key="index" class="order-card">
                <div>
                    <img :src="item.cheliangPhoto" alt="">
                </div>
                <div class="info">
                    <div class="row">订单号：{{item.cheliangOrderUuidNumber}}</div>
                    <div class="row">车辆：{{item.cheliangName}}</div>
                    <div class="row">价格：{{item.cheliangOrderPrice}}</div>
                    <div class="row">状态：{{item.cheliangOrderStatusValue}}</div>
                    <div class="row">
                        <a class="layui-btn layui-btn-primary layui-btn-xs" :href="'../cheliangOrder/detail.html?id=' + item.id">查看详情</a>
                    </div>
                    <div class="row" v-if="item.insertTime">下单时间：{{item.insertTime}}</div>
                    <div class="row" v-if="item.cancelReason">原因：{{item.cancelReason}}</div>
                    <div class="actions">
                        <button v-if="isYonghu && item.cheliangOrderStatusTypes==1" class="layui-btn layui-btn-normal layui-btn-sm" @click="payOrder(item)">去支付</button>
                        <button v-if="isYonghu && item.cheliangOrderStatusTypes==1" class="layui-btn layui-btn-primary layui-btn-sm" @click="cancelOrder(item)">取消</button>
                        <button v-if="isYonghu && item.cheliangOrderStatusTypes==3" class="layui-btn layui-btn-warm layui-btn-sm" @click="finishOrder(item)">确认收货</button>

                        <button v-if="isShangjia && item.cheliangOrderStatusTypes==2" class="layui-btn layui-btn-normal layui-btn-sm" @click="shipOrder(item)">发货</button>
                        <button v-if="isShangjia && item.cheliangOrderStatusTypes==2" class="layui-btn layui-btn-danger layui-btn-sm" @click="rejectOrder(item)">拒绝</button>
                        <button v-if="isShangjia && item.cheliangOrderStatusTypes==3" class="layui-btn layui-btn-warm layui-btn-sm" @click="finishOrder(item)">完成</button>
                    </div>
                </div>
            </div>

            <div id="pager"></div>
        </div>
    </div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>

<script>
    var vue = new Vue({
        el: '#app',
        data: {
            dataList: [],
            total: 0,
            page: 1,
            limit: 10,
            isYonghu: localStorage.getItem('userTable') === 'yonghu',
            isShangjia: localStorage.getItem('userTable') === 'shangjia'
        },
        methods: {
            loadData() {
                let params = {
                    page: this.page,
                    limit: this.limit,
                    orderBy: 'id'
                };
                if (this.isYonghu) {
                    params.yonghuId = localStorage.getItem('userid');
                }
                if (this.isShangjia) {
                    params.shangjiaId = localStorage.getItem('userid');
                }
                layui.http.request('cheliangOrder/list', 'get', params, (res) => {
                    this.dataList = res.data.list || [];
                    this.total = res.data.total || 0;
                    this.renderPager();
                });
            },
            renderPager() {
                layui.laypage.render({
                    elem: 'pager',
                    count: this.total,
                    limit: this.limit,
                    curr: this.page,
                    layout: ['count', 'prev', 'page', 'next'],
                    jump: (obj, first) => {
                        if (!first) {
                            this.page = obj.curr;
                            this.loadData();
                        }
                    }
                });
            },
            shipOrder(item) {
                layui.layer.confirm('确认发货吗？', {icon: 3, title: '提示'}, () => {
                    layui.http.requestJson('cheliangOrder/confirm', 'post', {id: item.id}, () => {
                        layui.layer.msg('已发货', {time: 1500, icon: 6}, () => {
                            this.loadData();
                        });
                    });
                });
            },
            rejectOrder(item) {
                layui.layer.confirm('确定拒绝该订单吗？', {icon: 3, title: '提示'}, () => {
                    layui.http.requestJson('cheliangOrder/reject', 'post', {id: item.id, cancelReason: '商家拒绝'}, () => {
                        layui.layer.msg('已拒绝', {time: 1500, icon: 6}, () => {
                            this.loadData();
                        });
                    });
                });
            },
            payOrder(item) {
                window.location.href = '../cheliangOrder/pay.html?orderIds=' + item.id;
            },
            finishOrder(item) {
                layui.layer.confirm('确认完成订单吗？', {icon: 3, title: '提示'}, () => {
                    layui.http.requestJson('cheliangOrder/finish', 'post', {id: item.id}, () => {
                        layui.layer.msg('订单已完成', {time: 1500, icon: 6}, () => {
                            this.loadData();
                        });
                    });
                });
            },
            cancelOrder(item) {
                layui.layer.confirm('确认取消该订单吗？', {icon: 3, title: '提示'}, () => {
                    layui.http.requestJson('cheliangOrder/cancel', 'post', {id: item.id, cancelReason: '用户取消'}, () => {
                        layui.layer.msg('订单已取消', {time: 1500, icon: 6}, () => {
                            this.loadData();
                        });
                    });
                });
            }
        }
    });

    layui.use(['layer', 'http', 'laypage'], function () {
        if (!localStorage.getItem('userTable')) {
            window.location.href = '../login/login.html';
            return;
        }
        vue.loadData();
    });
</script>
</body>
</html>
